version: '3.8'

services:
  # ============================================
  # Backend API (Express.js + SQLite)
  # ============================================
  api:
    build: ./mini-services/smartticket-backend
    container_name: smartticket-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=8h
      - JWT_REFRESH_EXPIRES_IN=7d
      - QR_SECRET=${QR_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - LOGIN_RATE_MAX=5
      - LOGIN_RATE_WINDOW_MS=900000
    volumes:
      - api-data:/app/data
    networks:
      - smartticket-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # Next.js Main App (Admin + Portal)
  # ============================================
  web:
    build: .
    container_name: smartticket-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_APP_NAME=SmartTicket Bus
    depends_on:
      api:
        condition: service_healthy
    networks:
      - smartticket-net

  # ============================================
  # PWA Controller (Scanner) - Static Nginx
  # ============================================
  controller:
    build: ./mini-services/smartticket-pwa
    container_name: smartticket-controller
    restart: unless-stopped
    networks:
      - smartticket-net

  # ============================================
  # Ticket Counter PWA - Static Nginx
  # ============================================
  counter:
    build: ./mini-services/smartticket-counter
    container_name: smartticket-counter
    restart: unless-stopped
    networks:
      - smartticket-net

  # ============================================
  # Nginx Reverse Proxy (Gateway)
  # ============================================
  proxy:
    image: nginx:alpine
    container_name: smartticket-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
      - controller
      - counter
    networks:
      - smartticket-net

volumes:
  api-data:
    driver: local

networks:
  smartticket-net:
    driver: bridge
