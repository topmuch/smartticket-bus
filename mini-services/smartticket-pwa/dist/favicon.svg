  <rect x="79" y="74" width="4" height="4" fill="#0f172a"/>
  <rect x="85" y="74" width="2" height="2" fill="#0f172a"/>
  <rect x="73" y="79" width="4" height="4" fill="#0f172a"/>
  <rect x="79" y="80" width="2" height="2" fill="#0f172a"/>
  <rect x="85" y="78" width="3" height="3" fill="#0f172a"/>
